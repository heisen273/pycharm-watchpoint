kotlin.code.style=official

# Gradle MUST run on JDK 21 (≤ 23). JDK 25 breaks the bundled Kotlin compiler.
# Leave this commented and set your own JDK 21 path here, or (preferred) in your
# user-global ~/.gradle/gradle.properties so it never lands in the repo.
# org.gradle.java.home=/path/to/jdk-21

# Path to the pyminify binary used to obfuscate watchpoint.py before packaging.
# Defaults to "pyminify" on the system PATH; override with your own venv or
# system install in gradle.properties or via -PpyminifyPath=... on the CLI.
pyminifyPath=pyminify

